
name: ADK Issue Triaging Agent (Java)

on:
  issues:
    types: [ opened ]
  schedule:
    # This runs at 6:00 AM UTC (10 PM PST)
    - cron: '0 6 * * *'

jobs:
  triage-open-issues:

    if: github.repository == 'google/adk-java'
    
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile

      - name: Run Triaging Agent
        env:
          GITHUB_TOKEN: ${{ secrets.ADK_TRIAGE_AGENT_GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

          GOOGLE_GENAI_USE_VERTEXAI: 0
          GOOGLE_CLOUD_LOCATION: us-central1
          GOOGLE_CLOUD_PROJECT: gtech-rmi-dev

          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          INTERACTIVE: 0
          EVENT_NAME: ${{ github.event_name }} # 'issues', 'schedule', etc.
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_COUNT_TO_PROCESS: '3' # Process 3 issues at a time on schedule
        run: mvn compile exec:java@run-triaging-agent -pl :triaging-agent
